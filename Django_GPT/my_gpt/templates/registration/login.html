{% extends 'my_gpt/base.html' %}

{% block title %}로그인 - Django GPT{% endblock %}

{% block content %}
<h2>로그인</h2>

{% if request.GET.required == "1" %}
  <script>
    alert("로그인 후 이용해주세요");
  </script>
{% endif %}

<form method="post" style="margin-top: 1.5rem;">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" style="padding: 0.5rem 1rem; background:#4f46e5; color:white; border:none; border-radius:4px; cursor:pointer;">로그인</button>
</form>
{% endblock %}
