name: Deploy to EC2

on:
  push:
    branches:
      - develop # develop 브랜치에 push할 때 실행

jobs:
  deploy:
    runs-on: ubuntu-latest # GitHub Actions 실행 환경

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Docker Hub 로그인
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker 이미지 빌드 및 push
        run: |
          docker compose build
          docker compose push

      - name: EC2에 배포
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~
            docker compose pull
            docker compose up -d
