{% extends 'ideas/base.html' %}

{% block content %}
<style>
    .form-container { max-width: 500px; margin: 0 auto; background: #fff; padding: 40px; border: 1px solid #dee2e6; border-radius: 8px; }
    .form-title { font-size: 1.6rem; margin-bottom: 25px; font-weight: bold; text-align: center; color: #212529; }
    .form-group { margin-bottom: 20px; display: flex; flex-direction: column; }
    .form-group label { font-size: 0.95rem; font-weight: 600; margin-bottom: 8px; color: #495057; }
    .form-control { padding: 10px; font-size: 1rem; border: 1px solid #ced4da; border-radius: 4px; font-family: inherit; }
    textarea.form-control { resize: vertical; min-height: 100px; }
    .btn-submit { width: 100%; padding: 12px; background-color: #198754; color: white; border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; }
    .btn-submit:hover { background-color: #157347; }
</style>

<div class="form-container">
    <h2 class="form-title">🛠 새 개발 툴 등록</h2>
    <form action="{% url 'devtool_create' %}" method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="name">개발 툴 이름</label>
            <input type="text" id="name" name="name" class="form-control" placeholder="예: Django, React" required>
        </div>
        <div class="form-group">
            <label for="kind">툴 종류 (Kind)</label>
            <input type="text" id="kind" name="kind" class="form-control" placeholder="예: 백엔드 프레임워크, 라이브러리" required>
        </div>
        <div class="form-group">
            <label for="content">툴 설명 (Content)</label>
            <textarea id="content" name="content" class="form-control" placeholder="개발 툴에 대한 간단한 설명을 입력하세요" required></textarea>
        </div>
        <button type="submit" class="btn-submit">개발 툴 등록하기</button>
    </form>
</div>
{% endblock %}
