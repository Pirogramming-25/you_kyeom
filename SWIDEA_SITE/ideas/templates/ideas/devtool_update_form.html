{% extends 'ideas/base.html' %}

{% block content %}
<style>

    .form-container {
        max-width: 500px;
        margin: 0 auto;
        background: #fff;
        padding: 40px;
        border: 1px solid #dee2e6;
        border-radius: 8px;
    }
    .form-title {
        font-size: 1.6rem;
        margin-bottom: 25px;
        font-weight: bold;
        text-align: center;
        color: #212529;
    }
    
    .form-group {
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
    }
    
    .form-label {
        font-size: 0.95rem;
        font-weight: 600;
        margin-bottom: 8px;
        color: #495057;
    }

    .form-control {
        padding: 10px;
        font-size: 1rem;
        border: 1px solid #ced4da;
        border-radius: 4px;
        transition: border-color 0.2s;
    }
    .form-control:focus {
        border-color: #0d6efd;
        outline: none;
    }
    
    .form-textarea {
        font-family: inherit;
        resize: vertical;
        min-height: 100px;
    }
    
    .btn-area {
        display: flex;
        gap: 10px;
    }
    
    .submit-btn {
        flex: 1;
        padding: 12px;
        background-color: #ffc107;
        color: #212529;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.2s;
    }
    .submit-btn:hover {
        background-color: #ffb300;
    }
    
    .cancel-btn {
        padding: 12px;
        background-color: #6c757d;
        color: white;
        border-radius: 4px;
        text-align: center;
        font-weight: bold;
        width: 80px;
        text-decoration: none;
        transition: background-color 0.2s;
    }
    .cancel-btn:hover {
        background-color: #5a6268;
    }
</style>

<div class="form-container">
    <h2 class="form-title">🧩 개발 툴 정보 수정</h2>
    
    <form action="{% url 'devtool_update' devtool.pk %}" method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label class="form-label">개발 툴 이름</label>
            <input type="text" name="name" class="form-control" value="{{ devtool.name }}" required>
        </div>
        
        <div class="form-group">
            <label class="form-label">툴 종류 (Kind)</label>
            <input type="text" name="kind" class="form-control" value="{{ devtool.kind }}" required>
        </div>
        
        <div class="form-group">
            <label class="form-label">툴 설명 (Content)</label>
            <textarea name="content" class="form-control form-textarea" required>{{ devtool.content }}</textarea>
        </div>
        
        <div class="btn-area">
            <button type="submit" class="submit-btn">수정 완료 및 저장</button>
            <a href="{% url 'devtool_detail' devtool.pk %}" class="cancel-btn">취소</a>
        </div>
    </form>
</div>
{% endblock %}
