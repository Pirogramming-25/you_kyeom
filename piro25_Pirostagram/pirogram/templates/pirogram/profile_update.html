{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Pirostagram - 프로필 수정</title>
    <style>
        h1 { font-style: italic; margin-bottom: 30px; font-size:40px;display: flex; justify-content: center; }
        .main-content { flex: 1; padding: 40px 10%; box-sizing: border-box; display: flex; justify-content: center; }
        .form-container { background: #fff; border: 1px solid #dbdbdb; border-radius: 8px; padding:10px 40px; width: 100%; max-width: 500px; box-sizing: border-box; }
        .form-title { font-size: 22px; font-weight: bold; margin-bottom: 24px; color: #262626; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #262626; }
        .form-group input[type="file"] { display: block; margin-top: 5px; }
        .form-group textarea { width: 100%; padding: 10px; border: 1px solid #dbdbdb; border-radius: 4px; box-sizing: border-box; resize: none; font-family: inherit; }
        
        .btn-submit { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 10px; }
        .btn-cancel { display: block; text-align: center; width: 100%; padding: 10px; background-color: transparent; color: #262626; border: 1px solid #dbdbdb; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 8px; text-decoration: none; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="form-container">
            <h1>Pirostagram</h1>
            <div class="form-title">프로필 편집</div>
            
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>프로필 사진 변경</label>
                    {{ form.profile_image }}
                </div>
                
                <div class="form-group">
                    <label>소개글</label>
                    {{ form.bio }}
                </div>
                
                <button type="submit" class="btn-submit">제출하기</button>
                <a href="{% url 'pirogram:profile' %}" class="btn-cancel">취소</a>
            </form>
        </div>
    </div>

</body>
</html>
